
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="utf-8">
            <title>경로 표시 지도</title>
            <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=3e82e4c9e67d0cfde4ca2c11723f094b&libraries=services"></script>
        </head>
        <body>
            <div id="map" style="width:100%;height:500px;"></div>
            <script>
                var mapContainer = document.getElementById('map'), // 지도를 표시할 div 
                    mapOption = {
                        center: new kakao.maps.LatLng(37.5562, 126.9723), // 지도의 중심좌표
                        level: 7 // 지도의 확대 레벨
                    }; 

                var map = new kakao.maps.Map(mapContainer, mapOption); // 지도를 생성합니다

                // 출발지 마커
                var startMarker = new kakao.maps.Marker({
                    position: new kakao.maps.LatLng(37.5562, 126.9723),
                    map: map,
                    title: '출발지'
                });

                // 도착지 마커
                var endMarker = new kakao.maps.Marker({
                    position: new kakao.maps.LatLng(37.4979, 127.0276),
                    map: map,
                    title: '도착지'
                });

                // 경로 폴리라인
                var linePath = [];

                var path = linePath.map(function(coord) {
                    return new kakao.maps.LatLng(coord[0], coord[1]);
                });

                var polyline = new kakao.maps.Polyline({
                    path: path,
                    strokeWeight: 5,
                    strokeColor: '#FF0000',
                    strokeOpacity: 0.7,
                    strokeStyle: 'solid'
                });

                polyline.setMap(map);
            </script>
        </body>
        </html>
